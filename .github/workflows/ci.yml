name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: Server audit & load
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: node -e "require('./src/app')"
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/mood-of-the-major-test
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars

  client:
    name: Client audit & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:4000
